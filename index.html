<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- 
      CSP 配置详解 (已修复 sprites.png 加载问题)：
      - default-src: 默认策略
      - script-src: 允许开发环境脚本
      - connect-src: 允许 ws/wss (热更新) 和 PlatformIO 注册表
      - img-src: 关键修复！添加了 https://blockly-demo.appspot.com 以允许加载 sprites.png
      - media-src: 允许加载音效
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self' 'unsafe-inline' blob: data:; 
      script-src 'self' 'unsafe-inline' 'unsafe-eval'; 
      connect-src 'self' https://registry.platformio.org https://raw.githubusercontent.com ws: wss:; 
      img-src 'self' data: blob: https://blockly-demo.appspot.com https://raw.githubusercontent.com; 
      media-src 'self' https://blockly-demo.appspot.com data:;
    ">
    
    <title>EmbedBlocks - Embedded Visual Programming</title>
    
    <style>
      body { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: #f1f5f9;
        margin: 0;
      }
      @media (prefers-color-scheme: dark) {
        body { background-color: #0f172a; color: white; }
      }
      
      code, pre { font-family: 'Consolas', 'Monaco', 'Courier New', monospace; }
      
      /* --- Blockly 样式微调 --- */
      .blocklyToolboxDiv {
        overflow-y: auto !important;
        scrollbar-width: none; /* Firefox */
        -ms-overflow-style: none;  /* IE 10+ */
      }
      .blocklyToolboxDiv::-webkit-scrollbar {
        width: 0px;
        background: transparent;
        display: none;
      }

      /* --- 全局滚动条美化 --- */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      @media (prefers-color-scheme: dark) {
        ::-webkit-scrollbar-thumb {
          background: #475569;
        }
        ::-webkit-scrollbar-thumb:hover {
          background: #64748b;
        }
      }
      .blocklyScrollbarHandle, 
      .blocklyScrollbarBackground {
        display: none !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
